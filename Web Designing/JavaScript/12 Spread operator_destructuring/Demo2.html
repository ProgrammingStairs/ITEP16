<script>
    //  spread operator (...)
    // with spread operator
    var [car1,car2,...car3] = ["nano","alto","kiger","kia","seltos"];
    // here car3 is rest parameter
    document.write("<br>car1 : "+car1);
    document.write("<br>car2 : "+car2);
    document.write("<br>car3 : "+car3);

    var name = "Andrew";
    document.write("<br>name : "+[...name]);
</script>
