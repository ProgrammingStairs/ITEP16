<script>
    // seal
    var obj = {
        name:"Andrew Anderson",
        age : 45,
        address : "Indore , Madhya Pradesh",
    }     

    document.write("<br>isSealed : "+Object.isSealed(obj));
    document.write("<br>name : "+obj.name);
    document.write("<br>age : "+obj.age);
    document.write("<br>address : "+obj.address);

    Object.seal(obj);
    document.write("<br>isSealed : "+Object.isSealed(obj));
    obj.pincode = 452010;
    delete obj.address;

    document.write("<br>pincode : "+obj.pincode);
    document.write("<br>address : "+obj.address);

    obj.name = "Peter Parker";
    document.write("<br>name : "+obj.name);



</script>
