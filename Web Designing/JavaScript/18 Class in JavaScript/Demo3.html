<script>
    var num1 = parseInt(prompt("Enter first number : "));
    var num2 = parseInt(prompt("Enter second number : "));
    
    class Demo3{
        setData(a,b){
            this.a = a;
            this.b = b;
        }
        add(){document.write("<br>sum : "+(this.a+this.b));}    
        sub(){document.write("<br>sub : "+(this.a-this.b));}    
        mul(){document.write("<br>mul : "+(this.a*this.b));}    
        div(){document.write("<br>div : "+(this.a/this.b));}    
        mod(){document.write("<br>mod : "+(this.a%this.b));}    
    }
    const obj = new Demo3();
    obj.setData(num1,num2);
    obj.add();
    obj.sub();
    obj.mul();
    obj.div();
    obj.mod();
</script>
