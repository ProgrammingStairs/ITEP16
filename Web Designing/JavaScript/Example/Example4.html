    function checkNum(num){
        return new Promise((resolve,reject)=>{
            (num%2==0) ? resolve("Even Number") : reject("Odd Number");
        });
    }
    var obj = checkNum(46);    
    obj.then((msg)=>{
        console.log(msg);
    }).catch((errMsg)=>{
        console.log(errMsg);
    });
</script>
