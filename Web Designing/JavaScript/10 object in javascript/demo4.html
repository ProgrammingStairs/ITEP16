<script>
    // by object literal
    var obj = {
        name : "Andrew Anderson",
        age : 45,
        status : true
    }
    
    for(var key in obj){
        document.write("<br>key <b>"+key+"</b> and its type is : <b>"+typeof key+"</b> and its value : <b>"+obj[key]+"</b> and value type : <b>"+typeof obj[key]+"</b>");
    }
</script>
