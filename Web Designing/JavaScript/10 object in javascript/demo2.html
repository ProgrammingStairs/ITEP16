<script>
    // by object literal
    var age = "age";
    var obj = {
        "full name" : "Andrew Anderson",
        age : 45,
        "address" : "Indore, Madhya Pradesh"
    }
    console.log("Name : "+obj["full name"]);
    console.log("Age : "+obj[age]);
    console.log("Address : "+obj["address"]);
    
    // by Object Constructor

    var obj1 = new Object();
    var age = "age";
    obj1["full name"] = "Peter Parker";
    obj1[age] = 56;
    obj1["address"] = "Indore, Madhya pradesh";

    console.log("\nName : "+obj1["full name"]);
    console.log("Age : "+obj1[age]);
    console.log("Address : "+obj1["address"]);
    
</script>
