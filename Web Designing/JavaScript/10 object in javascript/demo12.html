<script>
    var arr = [{
        name : {
            fname : "Andrew",
            lname : "Anderson"
        },
        age : 45,
        address : {
            city : "Indore",
            state : "Madhya Pradesh"
        }
    },{
        name : {
            fname : "Andrew",
            lname : "Anderson"
        },
        age : 34,
        address : {
            city : "Indore",
            state : "Madhya Pradesh"
        }
    },{
        name : {
            fname : "Andrew",
            lname : "Anderson"
        },
        age : 28,
        address : {
            city : "Indore",
            state : "Madhya Pradesh"
        }
    }];

    var table = `<table border='1' cellspacing='0'><tr><th>S.No</th><th>FirstName</th><th>LastName</th><th>Age</th><th>City</th><th>State</th></tr>`
    
    for(var index in arr){
        table+=`<tr><td>${parseInt(index)+1}</td>`;
            for(var key in arr[index]){
                if(typeof arr[index][key] === "object"){
                    for(var subkey in arr[index][key]){
                        if(typeof arr[index][key][subkey]==="object"){
                            // .....
                        }else{
                            table+=`<td>${arr[index][key][subkey]}</td>`;
                        }
                    }
                }else{
                    table+=`<td>${arr[index][key]}</td>`;
                }
            }
        table+=`</tr>`;    
    }    

    table+=`</table>`;

    document.write(table);
</script>
