<!-- Example showing the concept of Promise -->
<script>
    function gotoroom(){
        return new Promise((resolve,reject)=>{
            resolve("gotoroom resolve");
            // reject("gotoroom reject");
            // setTimeout(()=>{
            //     resolve("gotoroom resolve");
            // },1000);
        });
    }
    function removegarbage(){
        return new Promise((resolve,reject)=>{
            // resolve("removegarbage resolve");
            reject("removegarbage reject");
        });
    }
    function wonprize(){
        return new Promise((resolve,reject)=>{
            // resolve("wonprize resolve");
            reject("wonprize reject");
        });
    }
    Promise.allSettled([gotoroom(),removegarbage(),wonprize()]).then((obj)=>{
        // console.log("obj : ",obj);
        obj.forEach((e)=>{
            console.log("Status : "+e.status+" Message : "+ (e.value ? e.value : e.reason));
        })
    }).catch((errorMessage)=>{
        console.log("Error : ",errorMessage);
    });
</script>
