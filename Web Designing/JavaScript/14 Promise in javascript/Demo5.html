<!-- Example showing the concept of Promise -->
<script>
    function myFun(num){
        return new Promise((resolve,reject)=>{
            if(num>50)
                resolve(num*num);
            else
                reject(num+num);
        });
    }
    var num = 60;
    var promiseObj = myFun(num);
    var res = promiseObj.then((num)=>{
        return num-100;
    }).catch((num)=>{
        return num+100;
    });

    res.then((num)=>{
        console.log("then executes at resolve : "+num);
    }).catch((message)=>{
        console.log("catch executes at reject : "+message);
    });

</script>
