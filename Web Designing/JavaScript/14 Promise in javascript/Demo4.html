<!-- Example showing the concept of Promise -->
<script>
    function myFun(num){
        return new Promise((resolve,reject)=>{
            if(num>50)
                resolve(num*num);
            else
                reject(num+num);
        });
    }
    var num = 75;
    var promiseObj = myFun(num);
    promiseObj.then((msg)=>{
        document.write(msg);
    }).catch((errMsg)=>{
        document.write(errMsg);
    });

</script>
