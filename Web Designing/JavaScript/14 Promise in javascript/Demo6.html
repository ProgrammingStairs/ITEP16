<!-- Example showing the concept of Promise -->
<script>
    function myFun(num){
        return new Promise((resolve,reject)=>{
            if(num>50)
                resolve(num*num);
            else
                reject(num+num);
        });
    }
    var num = 10;
    var promiseObj = myFun(num);
    promiseObj.then((num)=>{
        return num-100;
    }).catch((num)=>{
        return num+100;
    }).then((num)=>{
        console.log("then executes at resolve : "+num);
    });

</script>
