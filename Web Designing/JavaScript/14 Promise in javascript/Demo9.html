<!-- Example showing the concept of Promise -->
<script>
    function gotoroom(){
        return new Promise((resolve,reject)=>{
            resolve("gotoroom resolve");
            // reject("gotoroom reject");
        });
    }
    function removegarbage(){
        return new Promise((resolve,reject)=>{
            // resolve("removegarbage resolve");
            reject("removegarbage reject");
        });
    }
    function wonprize(){
        return new Promise((resolve,reject)=>{
            resolve("wonprize resolve");
            // reject("wonprize reject");
        });
    }
    Promise.all([gotoroom(),removegarbage(),wonprize()]).then((message)=>{
        console.log("Message : ",message);
    }).catch((errorMessage)=>{
        console.log("Error : ",errorMessage);
    });
</script>
