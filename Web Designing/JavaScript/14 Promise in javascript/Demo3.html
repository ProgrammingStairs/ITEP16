    function myFun(num){
        return new Promise((resolve,reject)=>{
            (num%2==0) ? resolve("Even Number") : reject("Odd Number");
        });
    }
    var num = 672;
    var promiseObj = myFun(num);
    promiseObj.then((msg)=>{
        document.write(msg);
    }).catch((errMsg)=>{
        document.write(errMsg);
