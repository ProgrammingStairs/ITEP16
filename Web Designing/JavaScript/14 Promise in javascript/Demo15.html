<!-- Example showing the concept of Promise -->
<script>
    function gotoroom(){
        return new Promise((resolve,reject)=>{
            resolve("gotoroom");
        })
    }
    function removegarbage(){
        return new Promise((resolve,reject)=>{
            resolve("removegarbage");
        })
    }
    function wonprize(){
        return new Promise((resolve,reject)=>{
            resolve("wonprize");
        })
    }    
    gotoroom().then((message)=>{
            console.log(message);
            removegarbage().then((message)=>{
                console.log(message);
                wonprize().then((message)=>{
                    console.log(message);
                }).catch((error)=>{
                    console.log("Error : "+error);
                });
            }).catch((error)=>{
                console.log("Error : "+error);
            }); 
        }).catch((error)=>{
            console.log("Error : "+error);
        });
</script>
