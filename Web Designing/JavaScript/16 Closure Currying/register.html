    <blockquote>
<h2>Registration</h2>
<form action="" onsubmit="setData()">
    Username <br>
    <input 
        type="text"
        placeholder="Enter Username"
        name="username"
        id="username"   
        required 
    ><br>
    Email <br>
    <input 
        type="email"
        placeholder="Enter Email"
        name="email"
        id="email"
        required    
    ><br>
    Password <br>
    <input 
        type="password"
        placeholder="Enter Password"
        name="password"
        id="password" 
        required    
    ><br>
    Address <br>
    <input 
        type="text"
        placeholder="Enter Address"
        name="address"
        id="address"
        required    
    ><br>
    <input 
        type="submit"
        value="Register"
    >
    <input 
        type="reset"
        value="Reset"
    >
    <br>

</form>    
</blockquote>
