<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function operation(operator){
            var num1 = parseInt(document.getElementById("num1").value); 
            var num2 = parseInt(document.getElementById("num2").value); 
            
            if(operator=='+'){
                document.getElementById("result").value = num1+num2;
                document.getElementById("res").innerHTML = "Result : "+(num1+num2);
                document.getElementById("add").value = "Add : "+(num1+num2);
            }
            if(operator=='-'){
                document.getElementById("result").value = num1-num2;
                document.getElementById("res").innerHTML = "Sub : "+(num1-num2);
                document.getElementById("sub").value = "Sub : "+(num1-num2);
            }
            if(operator=='*'){
                document.getElementById("result").value = num1*num2;
                document.getElementById("res").innerHTML = "Mul : "+(num1*num2);
                document.getElementById("mul").value = "Mul : "+(num1*num2);
            }
        }
    </script>
</head>
<body>
    <h2>JavaScript Examples</h2>
    <input 
        type="text"
        placeholder="Enter First Number"
        id="num1"
        name="num1"
    > <br>
    <input 
        type="text"
        placeholder="Enter Second Number"
        id="num2"
        name="num2"
    > <br>
    <input 
        type="text"
        placeholder="Result"
        id="result"
        name="result"
        readonly
    > <br> <br>
    <input 
        type="submit"
        value="Add"
        id="add"
        onclick="operation('+')"
    > 
    <input 
        type="submit"
        value="Sub"
        id="sub"
        onclick="operation('-')"
    > 
    <input 
        type="submit"
        value="Mul"
        id="mul"
        onclick="operation('*')"
    > 
    <br> <br>
    <span id="res">Result will show here...</span>
</body>
</html>
