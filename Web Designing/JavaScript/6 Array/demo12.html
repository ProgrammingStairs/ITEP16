<!-- example showing the concept of array -->
 <script>
    var arr = [12,23,43,322,34,45]
    document.write("<br>Array elements are : "+arr);    

    var res = arr.includes(43);
    document.write("<br>res : "+res);

    var res = arr.includes(430);
    document.write("<br>res : "+res);

    var res = [45,56,[5,5,6,9],56,[56,678]];
    document.write("<br>res : "+res.flat());

    var res = arr.reverse();
    document.write("<br>res : "+res);

</script>
