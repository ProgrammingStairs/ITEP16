<!-- example showing the concept of array -->
<script>
    var arr = [];
    var size = prompt("Enter Size");

    alert("Enter Array elements : ");
    for(var i=0;i<size;i++){
        arr[i] = prompt("Enter "+(i+1)+" Element : ");
    }
    document.write("<br>Array elements are : ",arr);
    var index = prompt("Enter index");
    var element = prompt("Enter Element");

    for(var i=size-1;i>=index;i--){
        arr[i+1] = arr[i];
    }
    arr[index] = element;
    document.write("<br>Array elements are : "+arr);
</script>
