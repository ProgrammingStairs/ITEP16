<script>
    function myFun1(num){
        return new Promise((resolve,reject)=>{
            resolve(num*num);
        });
    }
    function myFun2(num){
        return new Promise((resolve,reject)=>{
            resolve(num+num);
        });
    }
    var num = 50;
    async function myFun(num){
        try{
            var value = await myFun1(num);
            var res = await myFun2(value);
            console.log("Result :  "+res);
        }catch(error){
            console.log("Error : "+error);
        }
    }
    myFun(num);
</script>
