<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function showTime(){
            var d = new Date();
            var res = d.toLocaleTimeString();
            document.getElementById("show").innerHTML = res;
        }
        setInterval(showTime,1000);
        var resData='';
        function myFun(){
            var d = new Date();
            var res = d.toLocaleTimeString();
            resData += res+"<br>";
            document.getElementById("demo").innerHTML = resData;
        }
    </script>
</head>
<body>
    <p id="show"></p>
    <button onclick="myFun()">Click</button>
    <p id="demo"></p>
</body>
</html>
