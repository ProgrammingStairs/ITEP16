<script>
    var color = "RED";
    switch(color.toLowerCase()){
        case "red": 
            document.write("Red color...");
            break;
        case "red": 
            document.write("Red color");
            break;
        case "green": 
            document.write("Green color");
            break;
        default: 
            document.write("Invalid color");
            break;
    }
</script>
