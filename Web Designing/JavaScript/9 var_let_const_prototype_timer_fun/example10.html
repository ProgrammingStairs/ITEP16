<script>
    var num1 = parseInt(prompt("Enter first number : "));
    var num2 = parseInt(prompt("Enter second number : "));
    function Swapping(){
        this.setData = function(num1,num2){
            this.num1 = num1;
            this.num2 = num2;
        }
        this.display = function(){
            console.log("Value of num1 : "+this.num1);
            console.log("Value of num2 : "+this.num2);            
        }
        this.swap = function(){
            var temp = this.num1;
            this.num1 = this.num2;
            this.num2 = temp;
        }
    }
    const obj = new Swapping();
    obj.setData(num1,num2);
    console.log("\nBefore Swapping : ");
    obj.display();
    obj.swap();
    console.log("\nAfter Swapping : ");
    obj.display();
    
</script>
